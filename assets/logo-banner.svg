<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 200" width="1000" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1a"/>
      <stop offset="100%" stop-color="#0d1420"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1000" height="200" rx="12" fill="url(#bg)"/>

  <!-- Logo mark -->
  <g transform="translate(80, 100) scale(1.3)">
    <!-- Circular outline -->
    <circle cx="0" cy="0" r="50" stroke="#4a9eff" stroke-width="1.8" opacity="0.3" fill="none"/>

    <!-- Edges: Outer to Middle -->
    <line x1="0" y1="-42" x2="0" y2="-24" stroke="#4a9eff" stroke-width="1.2" opacity="0.4"/>
    <line x1="-36" y1="-21" x2="0" y2="-24" stroke="#4a9eff" stroke-width="1.2" opacity="0.35"/>
    <line x1="36" y1="-21" x2="0" y2="-24" stroke="#4a9eff" stroke-width="1.2" opacity="0.35"/>
    <line x1="-36" y1="21" x2="-21" y2="12" stroke="#4a9eff" stroke-width="1.2" opacity="0.4"/>
    <line x1="36" y1="21" x2="21" y2="12" stroke="#4a9eff" stroke-width="1.2" opacity="0.4"/>
    <line x1="0" y1="42" x2="-21" y2="12" stroke="#4a9eff" stroke-width="1.2" opacity="0.35"/>
    <line x1="0" y1="42" x2="21" y2="12" stroke="#4a9eff" stroke-width="1.2" opacity="0.35"/>
    <line x1="-36" y1="-21" x2="-21" y2="12" stroke="#4a9eff" stroke-width="1" opacity="0.2"/>
    <line x1="36" y1="-21" x2="21" y2="12" stroke="#4a9eff" stroke-width="1" opacity="0.2"/>
    <line x1="0" y1="-42" x2="-21" y2="12" stroke="#4a9eff" stroke-width="1" opacity="0.15"/>
    <line x1="0" y1="-42" x2="21" y2="12" stroke="#4a9eff" stroke-width="1" opacity="0.15"/>

    <!-- Edges: Middle to Core -->
    <line x1="0" y1="-24" x2="0" y2="0" stroke="#4a9eff" stroke-width="1.8" opacity="0.5"/>
    <line x1="-21" y1="12" x2="0" y2="0" stroke="#4a9eff" stroke-width="1.8" opacity="0.5"/>
    <line x1="21" y1="12" x2="0" y2="0" stroke="#4a9eff" stroke-width="1.8" opacity="0.5"/>

    <!-- Outer ring nodes -->
    <circle cx="0" cy="-42" r="3.5" fill="#4a9eff" opacity="0.7"/>
    <circle cx="-36" cy="-21" r="3.5" fill="#4a9eff" opacity="0.7"/>
    <circle cx="-36" cy="21" r="3.5" fill="#4a9eff" opacity="0.7"/>
    <circle cx="0" cy="42" r="3.5" fill="#4a9eff" opacity="0.7"/>
    <circle cx="36" cy="21" r="3.5" fill="#4a9eff" opacity="0.75"/>
    <circle cx="36" cy="-21" r="3.5" fill="#4a9eff" opacity="0.75"/>

    <!-- Middle ring nodes -->
    <circle cx="0" cy="-24" r="4" fill="#4a9eff" opacity="0.85"/>
    <circle cx="-21" cy="12" r="4" fill="#4a9eff" opacity="0.85"/>
    <circle cx="21" cy="12" r="4" fill="#4a9eff" opacity="0.85"/>

    <!-- Core -->
    <circle cx="0" cy="0" r="8" fill="#4a9eff"/>
    <circle cx="0" cy="0" r="4" fill="#ffffff" opacity="0.4"/>

    <!-- Glow -->
    <circle cx="0" cy="0" r="14" fill="#4a9eff" opacity="0.15"/>
    <circle cx="0" cy="0" r="22" fill="#4a9eff" opacity="0.06"/>
  </g>

  <!-- Text: Awesome -->
  <text x="210" y="72" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="18" font-weight="300" letter-spacing="0.3em" fill="#5a6a7a">AWESOME</text>

  <!-- Text: Autonomous Operation -->
  <text x="210" y="120" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="42" font-weight="500" letter-spacing="0.02em" fill="#ffffff">Autonomous Operation</text>

  <!-- Accent line -->
  <line x1="210" y1="135" x2="420" y2="135" stroke="#4a9eff" stroke-width="1.5" opacity="0.4"/>

  <!-- Subtitle -->
  <text x="210" y="160" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="300" letter-spacing="0.05em" fill="#5a7a9a">AI-driven autonomous operations for IT and telecom</text>
</svg>
