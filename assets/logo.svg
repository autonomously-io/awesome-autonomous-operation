<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <g transform="translate(60, 60)">
    <!-- Circular outline -->
    <circle cx="0" cy="0" r="50" stroke="#4a9eff" stroke-width="1.8" opacity="0.3" fill="none"/>

    <!-- Edges: Outer → Middle (straight lines, node center to node center) -->
    <line x1="0" y1="-42" x2="0" y2="-24" stroke="#4a9eff" stroke-width="1.2" opacity="0.4"/>
    <line x1="-36" y1="-21" x2="0" y2="-24" stroke="#4a9eff" stroke-width="1.2" opacity="0.35"/>
    <line x1="36" y1="-21" x2="0" y2="-24" stroke="#4a9eff" stroke-width="1.2" opacity="0.35"/>
    <line x1="-36" y1="21" x2="-21" y2="12" stroke="#4a9eff" stroke-width="1.2" opacity="0.4"/>
    <line x1="36" y1="21" x2="21" y2="12" stroke="#4a9eff" stroke-width="1.2" opacity="0.4"/>
    <line x1="0" y1="42" x2="-21" y2="12" stroke="#4a9eff" stroke-width="1.2" opacity="0.35"/>
    <line x1="0" y1="42" x2="21" y2="12" stroke="#4a9eff" stroke-width="1.2" opacity="0.35"/>
    <line x1="-36" y1="-21" x2="-21" y2="12" stroke="#4a9eff" stroke-width="1" opacity="0.2"/>
    <line x1="36" y1="-21" x2="21" y2="12" stroke="#4a9eff" stroke-width="1" opacity="0.2"/>
    <line x1="0" y1="-42" x2="-21" y2="12" stroke="#4a9eff" stroke-width="1" opacity="0.15"/>
    <line x1="0" y1="-42" x2="21" y2="12" stroke="#4a9eff" stroke-width="1" opacity="0.15"/>

    <!-- Edges: Middle → Core -->
    <line x1="0" y1="-24" x2="0" y2="0" stroke="#4a9eff" stroke-width="1.8" opacity="0.5"/>
    <line x1="-21" y1="12" x2="0" y2="0" stroke="#4a9eff" stroke-width="1.8" opacity="0.5"/>
    <line x1="21" y1="12" x2="0" y2="0" stroke="#4a9eff" stroke-width="1.8" opacity="0.5"/>

    <!-- Outer ring nodes -->
    <circle cx="0" cy="-42" r="3.5" fill="#4a9eff" opacity="0.7"/>
    <circle cx="-36" cy="-21" r="3.5" fill="#4a9eff" opacity="0.7"/>
    <circle cx="-36" cy="21" r="3.5" fill="#4a9eff" opacity="0.7"/>
    <circle cx="0" cy="42" r="3.5" fill="#4a9eff" opacity="0.7"/>
    <circle cx="36" cy="21" r="3.5" fill="#4a9eff" opacity="0.75"/>
    <circle cx="36" cy="-21" r="3.5" fill="#4a9eff" opacity="0.75"/>

    <!-- Middle ring nodes -->
    <circle cx="0" cy="-24" r="4" fill="#4a9eff" opacity="0.85"/>
    <circle cx="-21" cy="12" r="4" fill="#4a9eff" opacity="0.85"/>
    <circle cx="21" cy="12" r="4" fill="#4a9eff" opacity="0.85"/>

    <!-- Core -->
    <circle cx="0" cy="0" r="8" fill="#4a9eff"/>
    <circle cx="0" cy="0" r="4" fill="#ffffff" opacity="0.4"/>

    <!-- Glow -->
    <circle cx="0" cy="0" r="14" fill="#4a9eff" opacity="0.15"/>
    <circle cx="0" cy="0" r="22" fill="#4a9eff" opacity="0.06"/>
  </g>

  <!-- Text: a10y -->
  <text x="140" y="76" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="56" font-weight="500" letter-spacing="0.04em" fill="#ffffff">
    <tspan>a</tspan><tspan fill="#4a9eff">10</tspan><tspan>y</tspan>
  </text>
</svg>
